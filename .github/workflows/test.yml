name: Test

on:
  workflow_call:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  test-code:
    name: Test code
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - service: "services/app"
            go-version-file: "services/app/go.mod"
          - service: "services/notification"
            go-version-file: "services/notification/go.mod"

    steps:
      - name: Checkout files
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.go-version-file }}
          cache: true

      - name: Test code
        run: go test ./...
        working-directory: ${{ matrix.service }}

  test-vulnerabilities:
    name: Test vulnerabilities
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: "services/app"
            go-version-file: "services/app/go.mod"
          - service: "services/notification"
            go-version-file: "services/notification/go.mod"
    steps:
      - name: Checkout files
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.go-version-file }}
          cache: true

      - uses: github/codeql-action/init@v4
        with:
          languages: go
          source-root: ${{ matrix.service }}

      - uses: github/codeql-action/analyze@v4

      - name: Install govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...
        working-directory: ${{ matrix.service }}
